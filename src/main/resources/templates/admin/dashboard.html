<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg: #111315;
            --surface: #171a1d;
            --surface-soft: #202428;
            --text: #f1f3f5;
            --muted: #a4a8ae;
            --border: #2d3339;
            --accent: #8ab4ff;
            --accent-soft: rgba(138, 180, 255, 0.12);
            --success: #34d399;
            --warning: #fbbf24;
            --shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        .dashboard {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 280px 1fr;
        }

        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 28px;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .brand {
            font-size: 1.35rem;
            font-weight: 850;
            margin-bottom: 36px;
        }

        .nav-btn {
            width: 100%;
            border: 0;
            background: transparent;
            color: var(--muted);
            text-align: left;
            padding: 12px 14px;
            border-radius: 14px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background: var(--accent-soft);
            color: var(--text);
        }

        .main {
            padding: 36px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .page-title {
            font-size: clamp(2rem, 4vw, 3.2rem);
            font-weight: 850;
            letter-spacing: -0.04em;
        }

        .muted {
            color: var(--muted);
        }

        .panel,
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .panel {
            overflow: hidden;
        }

        .panel-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .stat-card {
            padding: 24px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 850;
        }

        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text);
            --bs-table-border-color: var(--border);
            margin-bottom: 0;
        }

        .table thead {
            background: var(--surface-soft);
        }

        .table th,
        .table td {
            color: var(--text);
            padding: 18px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .table th {
            font-weight: 800;
        }

        .table-hover tbody tr:hover {
            background: var(--surface-soft);
        }

        .btn-primary-custom {
            background: var(--text);
            color: var(--bg);
            border: 1px solid var(--text);
        }

        .btn-primary-custom:hover {
            background: transparent;
            color: var(--text);
        }

        .btn-outline-custom {
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-outline-custom:hover {
            background: var(--surface-soft);
            color: var(--text);
        }

        .badge-soft {
            border-radius: 999px;
            padding: 7px 11px;
            font-weight: 800;
            font-size: 0.75rem;
        }

        .badge-paid {
            background: rgba(16, 185, 129, 0.18);
            color: var(--success);
        }

        .badge-warning-custom {
            background: rgba(245, 158, 11, 0.18);
            color: var(--warning);
        }

        .badge-neutral {
            background: var(--surface-soft);
            color: var(--muted);
        }

        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .sidebar {
                height: auto;
                position: static;
            }

            .main {
                padding: 24px;
            }
        }


        .form-control {
            background: var(--surface-soft);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 14px;
            padding: 12px 14px;
        }

        .form-control:focus {
            background: var(--surface-soft);
            color: var(--text);
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem var(--accent-soft);
        }

        .form-label {
            font-weight: 700;
        }

        .form-text {
            color: var(--muted);
        }

        .image-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .image-preview-card {
            position: relative;
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            background: var(--surface-soft);
        }

        .image-preview-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
        }

        .image-preview-name {
            padding: 8px 10px;
            font-size: 0.8rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .image-preview-remove {
            position: absolute;
            top: 8px;
            right: 8px;
            border: 0;
            border-radius: 999px;
            width: 28px;
            height: 28px;
            background: rgba(0, 0, 0, 0.72);
            color: white;
            font-size: 1.15rem;
            line-height: 1;
        }
    </style>
</head>

<body>

<div class="dashboard">
    <aside class="sidebar">
        <div class="brand">Učitelnice Admin</div>

        <button class="nav-btn active" onclick="showOverview(this)">Overview</button>
        <button class="nav-btn" onclick="showOrders(this)">Orders</button>
        <button class="nav-btn" onclick="showProducts(this)">Products</button>

        <hr style="border-color: var(--border); opacity: 1;">

        <a href="/products/new" class="btn btn-primary-custom w-100 mb-2">Create product</a>
        <a href="/products/all" class="btn btn-outline-custom w-100">Back to store</a>
    </aside>

    <main class="main">
        <div class="topbar">
            <div>
                <h1 id="pageTitle" class="page-title mb-1">Overview</h1>
                <p id="pageSubtitle" class="muted mb-0">Quick overview of your store.</p>
            </div>
        </div>

        <div id="content"></div>
    </main>
</div>

<script>
    const content = document.getElementById("content");
    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");

    function setActive(button) {
        document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
    }

    function formatMoney(value) {
        return `${value ?? 0} Kč`;
    }

    async function showOverview(button) {
        if (button) setActive(button);

        pageTitle.textContent = "Overview";
        pageSubtitle.textContent = "Quick overview of your store.";

        content.innerHTML = `<p class="muted">Loading overview...</p>`;

        const [ordersRes, productsRes] = await Promise.all([
            fetch("/api/orders/all-orders"),
            fetch("/api/products/all")
        ]);

        const orders = await ordersRes.json();
        const products = await productsRes.json();

        const paidOrders = orders.filter(o => o.paymentStatus === "PAID");
        const revenue = paidOrders.reduce((sum, o) => sum + Number(o.totalAmount ?? 0), 0);

        content.innerHTML = `
            <div class="row g-4">
                <div class="col-12 col-md-4">
                    <div class="stat-card">
                        <p class="muted mb-1">Orders</p>
                        <div class="stat-value">${orders.length}</div>
                    </div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="stat-card">
                        <p class="muted mb-1">Paid revenue</p>
                        <div class="stat-value">${revenue.toFixed(2)} Kč</div>
                    </div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="stat-card">
                        <p class="muted mb-1">Products</p>
                        <div class="stat-value">${products.length}</div>
                    </div>
                </div>
            </div>
        `;
    }

    async function showOrders(button) {
        if (button) setActive(button);

        pageTitle.textContent = "Orders";
        pageSubtitle.textContent = "Manage customer orders.";

        content.innerHTML = `<p class="muted">Loading orders...</p>`;

        const response = await fetch("/api/orders/all-orders");

        if (!response.ok) {
            content.innerHTML = `<div class="alert alert-danger">Failed to load orders.</div>`;
            return;
        }

        const orders = await response.json();

        if (orders.length === 0) {
            content.innerHTML = `
                <div class="panel p-4 text-center">
                    <h2 class="h5">No orders found</h2>
                    <p class="muted mb-0">Orders will appear here after checkout.</p>
                </div>
            `;
            return;
        }

        let html = `
            <div class="panel">
                <div class="panel-header">
                    <h2 class="h4 mb-1">Orders</h2>
                    <p class="muted mb-0">Overview of customer orders.</p>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Email</th>
                                <th>Total</th>
                                <th>Order status</th>
                                <th>Payment status</th>
                                <th>Created</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
        `;

        orders.forEach(order => {
            const paymentBadge = order.paymentStatus === "PAID"
                ? "badge-paid"
                : "badge-warning-custom";

            html += `
                <tr>
                    <td class="fw-bold">#${order.id}</td>
                    <td>${order.customerEmail ?? "-"}</td>
                    <td class="fw-semibold">${formatMoney(order.totalAmount)}</td>
                    <td><span class="badge-soft badge-neutral">${order.orderStatus}</span></td>
                    <td><span class="badge-soft ${paymentBadge}">${order.paymentStatus}</span></td>
                    <td class="muted">${order.createdAt ?? ""}</td>
                    <td class="text-end">
                        <button class="btn btn-outline-custom btn-sm" onclick="showOrderDetail(${order.id})">
                            Detail
                        </button>
                    </td>
                </tr>
            `;
        });

        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;

        content.innerHTML = html;
    }

    async function showOrderDetail(orderId) {
        pageTitle.textContent = `Order #${orderId}`;
        pageSubtitle.textContent = "Order detail and purchased products.";

        content.innerHTML = `<p class="muted">Loading order detail...</p>`;

        const [orderRes, itemsRes] = await Promise.all([
            fetch(`/api/orders/${orderId}`),
            fetch(`/api/order_items/${orderId}/order-items`)
        ]);

        if (!orderRes.ok || !itemsRes.ok) {
            content.innerHTML = `<div class="alert alert-danger">Failed to load order detail.</div>`;
            return;
        }

        const order = await orderRes.json();
        const items = await itemsRes.json();

        const paymentBadge = order.paymentStatus === "PAID"
            ? "badge-paid"
            : "badge-warning-custom";

        let itemsHtml = "";

        items.forEach(item => {
            itemsHtml += `
                <tr>
                    <td class="fw-bold">#${item.productId}</td>
                    <td>${item.productTitle ?? "-"}</td>
                    <td>${item.unitPrice} Kč</td>
                    <td>${item.quantity}</td>
                    <td class="fw-semibold">${item.total} Kč</td>
                </tr>
            `;
        });

        content.innerHTML = `
            <div class="mb-4">
                <button class="btn btn-outline-custom" onclick="showOrders()">← Back to orders</button>
            </div>

            <div class="panel mb-4 p-4">
                <div class="d-flex justify-content-between flex-wrap gap-3">
                    <div>
                        <p class="muted mb-1">Customer email</p>
                        <h2 class="h4 mb-0">${order.customerEmail ?? "-"}</h2>
                    </div>

                    <div class="text-end">
                        <span class="badge-soft ${paymentBadge}">${order.paymentStatus}</span>
                        <span class="badge-soft badge-neutral">${order.orderStatus}</span>
                    </div>
                </div>

                <hr style="border-color: var(--border); opacity: 1;">

                <div class="row g-3">
                    <div class="col-md-4">
                        <p class="muted mb-1">Order ID</p>
                        <p class="fw-semibold mb-0">#${order.id}</p>
                    </div>
                    <div class="col-md-4">
                        <p class="muted mb-1">Total</p>
                        <p class="fw-semibold mb-0">${order.totalAmount} Kč</p>
                    </div>
                    <div class="col-md-4">
                        <p class="muted mb-1">Created</p>
                        <p class="fw-semibold mb-0">${order.createdAt ?? ""}</p>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h2 class="h4 mb-1">Purchased products</h2>
                    <p class="muted mb-0">Products included in this order.</p>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Product ID</th>
                                <th>Product title</th>
                                <th>Unit price</th>
                                <th>Quantity</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${itemsHtml}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

    async function showProducts(button) {
        if (button) setActive(button);

        pageTitle.textContent = "Products";
        pageSubtitle.textContent = "Manage products in your store.";

        content.innerHTML = `<p class="muted">Loading products...</p>`;

        const response = await fetch("/api/products/all-admin");

        if (!response.ok) {
            content.innerHTML = `<div class="alert alert-danger">Failed to load products.</div>`;
            return;
        }

        const products = await response.json();

        if (products.length === 0) {
            content.innerHTML = `
                <div class="panel p-4 text-center">
                    <h2 class="h5">No products found</h2>
                    <p class="muted mb-3">Create your first product.</p>
                    <a href="/products/new" class="btn btn-primary-custom">Create product</a>
                </div>
            `;
            return;
        }

        let html = `
            <div class="panel">
                <div class="panel-header d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <h2 class="h4 mb-1">Products</h2>
                        <p class="muted mb-0">Product management overview.</p>
                    </div>
                    <a href="/products/new" class="btn btn-primary-custom">Create product</a>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th>Created</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
        `;

        products.forEach(product => {
            html += `
                <tr>
                    <td class="fw-bold">#${product.id}</td>
                    <td>${product.title}</td>
                    <td class="fw-semibold">${product.price} Kč</td>
                    <td>
                        <span class="badge-soft ${product.active ? "badge-paid" : "badge-warning-custom"}">
                            ${product.active ? "ACTIVE" : "INACTIVE"}
                        </span>
                    </td>
                    <td class="muted">${product.createdAt ?? ""}</td>
                    <td class="text-end">
                        <a href="/products/${product.id}" class="btn btn-outline-custom btn-sm">View</a>
                        <button class="btn btn-outline-custom btn-sm" onclick="showEditProduct(${product.id})">
                            Edit
                        </button>
                        <button class="btn btn-outline-custom btn-sm"
                                onclick="toggleProductStatus(${product.id}, ${product.active})">
                            ${product.active ? "Deactivate" : "Activate"}
                        </button>
                        <button class="btn btn-outline-custom btn-sm"
                                onclick="deleteProduct(${product.id})">
                            Delete
                        </button>
                    </td>
                </tr>
            `;
        });

        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;

        content.innerHTML = html;
    }
    function getCsrfHeaders() {
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        return {
            [csrfHeader]: csrfToken
        };
    }

    async function toggleProductStatus(productId, isActive) {
        const message = isActive
            ? "Deactivate this product?"
            : "Activate this product?";

        if (!confirm(message)) return;

        const response = await fetch(`/api/products/${productId}/deactivate`, {
            method: "PUT",
            headers: getCsrfHeaders()
        });

        if (response.ok) {
            showProducts();
        } else {
            alert("Failed to update product status.");
        }
    }

    async function deleteProduct(productId) {
        if (!confirm("Delete this product permanently?")) return;

        const response = await fetch(`/api/products/${productId}`, {
            method: "DELETE",
            headers: getCsrfHeaders()
        });

        if (response.ok) {
            showProducts();
        } else {
            alert("Failed to delete product.");
        }
    }

    let selectedEditImages = [];
    let imageIdsToDelete = [];

    async function showEditProduct(productId) {
        pageTitle.textContent = `Edit product #${productId}`;
        pageSubtitle.textContent = "Update product information, images and download URL.";

        content.innerHTML = `<p class="muted">Loading product...</p>`;

        const response = await fetch(`/api/products/${productId}`);

        if (!response.ok) {
            content.innerHTML = `<div class="alert alert-danger">Failed to load product.</div>`;
            return;
        }

        const product = await response.json();

        const existingImages = product.productImages ?? product.images ?? [];

        content.innerHTML = `
        <div class="mb-4">
            <button class="btn btn-outline-custom" onclick="showProducts()">← Back to products</button>
        </div>

        <div class="panel p-4">
            <div class="mb-4">
                <h2 class="h4 mb-1">Edit product</h2>
                <p class="muted mb-0">Changes will be saved to the existing product.</p>
            </div>

            <div id="editAlertContainer"></div>

            <form id="editProductForm" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input id="editTitle" class="form-control" value="${product.title ?? ""}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea id="editDescription" class="form-control" rows="5">${product.description ?? ""}</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Price</label>
                    <input id="editPrice" type="number" step="0.01" min="0.01" class="form-control" value="${product.price ?? ""}">
                </div>

                <div class="mb-4">
                    <label class="form-label">Google Drive URL</label>
                    <input id="editGoogleDriveUrl" type="url" class="form-control" value="${product.googleDriveUrl ?? ""}">
                </div>

                <div class="mb-4">
                    <label class="form-label">Existing images</label>
                    <div id="existingImagesPreview" class="image-preview-grid"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Add new images</label>
                    <input id="editImages" type="file" class="form-control" accept="image/*" multiple>
                    <div class="form-text muted">
                        Selected new images can be removed before saving.
                    </div>
                    <div id="editImagePreview" class="image-preview-grid mt-3"></div>
                </div>

                <div class="d-flex flex-wrap gap-2">
                    <button type="submit" class="btn btn-primary-custom" id="editSubmitBtn">
                        Save changes
                    </button>
                    <button type="button" class="btn btn-outline-custom" onclick="showProducts()">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    `;

        selectedEditImages = [];
        imageIdsToDelete = [];

        renderExistingImages(existingImages);
        setupEditImagePicker();

        document.getElementById("editProductForm").addEventListener("submit", function (e) {
            e.preventDefault();
            submitEditProduct(productId);
        });
    }

    function renderExistingImages(images) {
        const container = document.getElementById("existingImagesPreview");

        if (!images || images.length === 0) {
            container.innerHTML = `<p class="muted mb-0">No images uploaded.</p>`;
            return;
        }

        container.innerHTML = "";

        images.forEach(image => {
            const imageUrl = image.url ?? image.imageUrl ?? image.secureUrl;

            const card = document.createElement("div");
            card.className = "image-preview-card";

            card.innerHTML = `
            <img src="${imageUrl}" alt="Product image">
            <button type="button" class="image-preview-remove" onclick="markExistingImageForDelete(${image.id}, this)">×</button>
            <div class="image-preview-name">Image #${image.id}</div>
        `;

            container.appendChild(card);
        });
    }

    function markExistingImageForDelete(imageId, button) {
        if (!imageIdsToDelete.includes(imageId)) {
            imageIdsToDelete.push(imageId);
        }

        const card = button.closest(".image-preview-card");
        card.style.opacity = "0.35";
        button.disabled = true;
    }

    function setupEditImagePicker() {
        const input = document.getElementById("editImages");

        input.addEventListener("change", function () {
            const newImages = Array.from(input.files);

            newImages.forEach(newImage => {
                const alreadyExists = selectedEditImages.some(existingImage =>
                    existingImage.name === newImage.name &&
                    existingImage.size === newImage.size
                );

                if (!alreadyExists) {
                    selectedEditImages.push(newImage);
                }
            });

            input.value = "";
            renderEditImagePreview();
        });
    }

    function renderEditImagePreview() {
        const container = document.getElementById("editImagePreview");
        container.innerHTML = "";

        selectedEditImages.forEach((file, index) => {
            const imageUrl = URL.createObjectURL(file);

            const card = document.createElement("div");
            card.className = "image-preview-card";

            card.innerHTML = `
            <img src="${imageUrl}" alt="${file.name}">
            <button type="button" class="image-preview-remove" onclick="removeEditSelectedImage(${index})">×</button>
            <div class="image-preview-name">${file.name}</div>
        `;

            container.appendChild(card);
        });
    }

    function removeEditSelectedImage(index) {
        selectedEditImages.splice(index, 1);
        renderEditImagePreview();
    }

    async function submitEditProduct(productId) {
        const submitBtn = document.getElementById("editSubmitBtn");
        const alertContainer = document.getElementById("editAlertContainer");

        const request = {
            title: document.getElementById("editTitle").value,
            description: document.getElementById("editDescription").value,
            price: document.getElementById("editPrice").value,
            googleDriveUrl: document.getElementById("editGoogleDriveUrl").value,
            imageIdsToDelete: imageIdsToDelete
        };

        const formData = new FormData();

        formData.append(
            "req",
            new Blob([JSON.stringify(request)], {
                type: "application/json"
            })
        );

        selectedEditImages.forEach(image => {
            formData.append("images", image);
        });

        submitBtn.disabled = true;
        submitBtn.textContent = "Saving...";

        try {
            const response = await fetch(`/api/products/edit/${productId}`, {
                method: "PUT",
                headers: getCsrfHeaders(),
                body: formData
            });

            if (response.ok) {
                await showProducts();
                return;
            }

            alertContainer.innerHTML = `
            <div class="alert alert-danger">
                Failed to update product.
            </div>
        `;
        } catch (error) {
            alertContainer.innerHTML = `
            <div class="alert alert-danger">
                Unexpected error while updating product.
            </div>
        `;
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Save changes";
        }
    }

    showOverview();
</script>

</body>
