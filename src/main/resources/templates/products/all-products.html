<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Products</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/products/all">Home</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link active" href="/products/all">All products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/cart">Cart</a>
                </li>

                <li class="nav-item" th:if="${!isLoggedIn}">
                    <a class="btn btn-outline-dark btn-sm" href="/oauth2/authorization/keycloak">Admin login</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="btn btn-dark btn-sm" href="/products/new">Create product</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="nav-link" href="/orders/all-orders">Orders</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <span class="nav-link text-muted">
                        Logged in as: <strong th:text="${username}"></strong>
                    </span>
                </li>

                <li class="nav-item" th:if="${isLoggedIn}">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="py-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h2 mb-1">All products</h1>
                <p class="text-muted mb-0">Browse available teaching materials.</p>
            </div>
        </div>

        <div id="productsContainer" class="row g-4"></div>
    </div>
</section>

<script>
    async function getCartQuantities() {
        const response = await fetch("/api/cart");
        const cartItems = await response.json();

        const quantities = {};

        cartItems.forEach(item => {
            quantities[item.productId] = item.quantity;
        });

        return quantities;
    }

    async function addCartItem(productId) {
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        const response = await fetch(`/api/cart/add/${productId}`, {
            method: "POST",
            headers: {
                [csrfHeader]: csrfToken
            }
        });

        if (response.ok) {
            loadProducts();
        } else {
            alert("Failed to add product to cart");
        }
    }

    async function decreaseCartItem(productId) {
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        const response = await fetch(`/api/cart/decrease/${productId}`, {
            method: "POST",
            headers: {
                [csrfHeader]: csrfToken
            }
        });

        if (response.ok) {
            loadProducts();
        } else {
            alert("Failed to decrease product quantity");
        }
    }

    async function loadProducts() {
        const [productsResponse, quantities] = await Promise.all([
            fetch("/api/products/all"),
            getCartQuantities()
        ]);

        const products = await productsResponse.json();

        const container = document.getElementById("productsContainer");
        container.innerHTML = "";

        if (products.length === 0) {
            container.innerHTML = `
                <div class="col-12">
                    <div class="alert alert-light border text-center mb-0">
                        No products found.
                    </div>
                </div>
            `;
            return;
        }

        products.forEach(product => {
            const quantity = quantities[product.id] ?? 0;

            const cartControls = quantity === 0
                ? `<button type="button" class="btn btn-dark btn-sm" onclick="addCartItem(${product.id})">Add to cart</button>`
                : `
                    <div class="d-inline-flex align-items-center gap-2">
                        <button type="button" class="btn btn-outline-dark btn-sm" onclick="decreaseCartItem(${product.id})">-</button>
                        <span class="fw-semibold">${quantity}</span>
                        <button type="button" class="btn btn-outline-dark btn-sm" onclick="addCartItem(${product.id})">+</button>
                    </div>
                `;

            const col = document.createElement("div");
            col.className = "col-12 col-md-6 col-xl-4";

            col.innerHTML = `
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title mb-2">
                            <a href="/products/${product.id}" class="text-decoration-none text-dark">
                                ${product.title}
                            </a>
                        </h5>

                        <p class="card-text text-muted mb-3">
                            ${product.description ?? ""}
                        </p>

                        <div class="mt-auto">
                            <p class="mb-2"><strong>Price:</strong> ${product.price} $</p>
                            <div>
                                ${cartControls}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            container.appendChild(col);
        });
    }

    loadProducts();
</script>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
