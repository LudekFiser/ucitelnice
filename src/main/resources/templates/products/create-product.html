<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Product</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/products/all">Home</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link" href="/products/all">All products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/cart">Cart</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="btn btn-dark btn-sm" href="/products/new">Create product</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="nav-link" href="/orders/all-orders">Orders</a>
                </li>

                <li class="nav-item" th:if="${isLoggedIn}">
                    <span class="nav-link text-muted">
                        Logged in as: <strong th:text="${username}"></strong>
                    </span>
                </li>

                <li class="nav-item" th:if="${isLoggedIn}">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="py-5">
    <div class="container">
        <div class="mb-4">
            <a href="/products/all" class="text-decoration-none">← Back to all products</a>
        </div>

        <div class="row justify-content-center">
            <div class="col-12 col-lg-8 col-xl-7">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-lg-5">
                        <div class="mb-4">
                            <h1 class="h3 mb-1">Create product</h1>
                            <p class="text-muted mb-0">Add a new product to your store.</p>
                        </div>

                        <div id="alertContainer"></div>

                        <form id="productForm" novalidate enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="title" class="form-label">Title</label>
                                <input
                                        type="text"
                                        class="form-control"
                                        id="title"
                                        name="title"
                                        placeholder="Enter product title"
                                        required>
                                <div class="invalid-feedback" id="titleError">
                                    Title is required.
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea
                                        class="form-control"
                                        id="description"
                                        name="description"
                                        rows="5"
                                        placeholder="Describe the product"></textarea>
                            </div>

                            <div class="mb-4">
                                <label for="price" class="form-label">Price</label>
                                <input
                                        type="number"
                                        class="form-control"
                                        id="price"
                                        name="price"
                                        step="0.01"
                                        min="0.01"
                                        placeholder="0.00"
                                        required>
                                <div class="invalid-feedback" id="priceError">
                                    Price is required.
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="googleDriveUrl" class="form-label">Google Drive URL</label>
                                <input
                                        type="url"
                                        class="form-control"
                                        id="googleDriveUrl"
                                        name="googleDriveUrl"
                                        placeholder="https://drive.google.com/...">
                                <div class="form-text">
                                    Link to the digital product file.
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="images" class="form-label">Product images</label>
                                <input
                                        type="file"
                                        class="form-control"
                                        id="images"
                                        name="images"
                                        accept="image/*"
                                        multiple>
                                <div class="form-text">
                                    You can upload one or more product images.
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-dark" id="submitBtn">
                                    Create product
                                </button>
                                <a href="/products/all" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    const form = document.getElementById("productForm");
    const submitBtn = document.getElementById("submitBtn");
    const alertContainer = document.getElementById("alertContainer");

    function showAlert(message, type = "danger") {
        alertContainer.innerHTML = `
            <div class="alert alert-${type}" role="alert">
                ${message}
            </div>
        `;
    }

    function clearValidation() {
        document.getElementById("title").classList.remove("is-invalid");
        document.getElementById("price").classList.remove("is-invalid");
        alertContainer.innerHTML = "";
    }

    function validateForm(data) {
        let isValid = true;

        if (!data.title || data.title.trim() === "") {
            document.getElementById("title").classList.add("is-invalid");
            isValid = false;
        }

        if (!data.price || Number(data.price) <= 0) {
            document.getElementById("price").classList.add("is-invalid");
            isValid = false;
        }

        return isValid;
    }

    form.addEventListener("submit", async function (e) {
        e.preventDefault();

        clearValidation();

        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        const request = {
            title: document.getElementById("title").value,
            description: document.getElementById("description").value,
            price: document.getElementById("price").value,
            googleDriveUrl: document.getElementById("googleDriveUrl").value
        };

        if (!validateForm(request)) {
            return;
        }

        const formData = new FormData();

        formData.append(
            "request",
            new Blob([JSON.stringify(request)], {
                type: "application/json"
            })
        );

        const images = document.getElementById("images").files;

        for (const image of images) {
            formData.append("images", image);
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Creating...";

        try {
            const response = await fetch("/api/products/create", {
                method: "POST",
                headers: {
                    [csrfHeader]: csrfToken
                },
                body: formData
            });

            if (response.ok) {
                window.location.href = "/products/all";
                return;
            }

            if (response.status === 403) {
                window.location.href = "/access-denied";
                return;
            }

            showAlert("Product creation failed.");
        } catch (error) {
            showAlert("Unexpected error occurred.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Create product";
        }
    });
</script>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
