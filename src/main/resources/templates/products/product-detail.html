<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/products/all">Home</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link" href="/products/all">All products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/cart">Cart</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="nav-link" href="/orders/all-orders">Orders</a>
                </li>

                <li class="nav-item" th:if="${!isLoggedIn}">
                    <a class="btn btn-outline-dark btn-sm" href="/oauth2/authorization/keycloak">Admin login</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="btn btn-dark btn-sm" href="/products/new">Create product</a>
                </li>

                <li class="nav-item" th:if="${isLoggedIn}">
                    <span class="nav-link text-muted">
                        Logged in as: <strong th:text="${username}"></strong>
                    </span>
                </li>

                <li class="nav-item" th:if="${isLoggedIn}">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="py-5">
    <div class="container">
        <div class="mb-4">
            <a href="/products/all" class="text-decoration-none">← Back to all products</a>
        </div>

        <div id="productContainer">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <p class="text-muted mb-0">Loading product...</p>
                </div>
            </div>
        </div>
    </div>
</section>

<script th:inline="javascript">
    const productId = /*[[${productId}]]*/ 0;

    async function getCartQuantities() {
        const response = await fetch("/api/cart");
        const cartItems = await response.json();

        const quantities = {};

        cartItems.forEach(item => {
            quantities[item.productId] = item.quantity;
        });

        return quantities;
    }

    async function addCartItem(productId) {
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        const response = await fetch(`/api/cart/add/${productId}`, {
            method: "POST",
            headers: {
                [csrfHeader]: csrfToken
            }
        });

        if (response.ok) {
            loadProduct();
        } else {
            alert("Failed to add product to cart");
        }
    }

    async function decreaseCartItem(productId) {
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        const response = await fetch(`/api/cart/decrease/${productId}`, {
            method: "POST",
            headers: {
                [csrfHeader]: csrfToken
            }
        });

        if (response.ok) {
            loadProduct();
        } else {
            alert("Failed to decrease product quantity");
        }
    }

    async function loadProduct() {
        const [productResponse, quantities] = await Promise.all([
            fetch(`/api/products/${productId}`),
            getCartQuantities()
        ]);

        const container = document.getElementById("productContainer");

        if (!productResponse.ok) {
            container.innerHTML = `
                <div class="alert alert-danger">
                    Product not found.
                </div>
            `;
            return;
        }

        const product = await productResponse.json();
        const quantity = quantities[product.id] ?? 0;

        const cartControls = quantity === 0
            ? `<button type="button" class="btn btn-dark" onclick="addCartItem(${product.id})">Add to cart</button>`
            : `
                <div class="d-inline-flex align-items-center gap-2">
                    <button type="button" class="btn btn-outline-dark" onclick="decreaseCartItem(${product.id})">-</button>
                    <span class="fw-semibold">${quantity}</span>
                    <button type="button" class="btn btn-outline-dark" onclick="addCartItem(${product.id})">+</button>
                </div>
            `;

        container.innerHTML = `
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <div class="row g-4">
                        <div class="col-12 col-lg-8">
                            <h1 class="h2 mb-3">${product.title}</h1>
                            <p class="text-muted mb-4">${product.description ?? ""}</p>

                            <div class="mb-3">
                                <span class="badge text-bg-light border">Status: ${product.active ? "Active" : "Inactive"}</span>
                            </div>

                            <p class="text-muted small mb-4">
                                Created: ${product.createdAt ?? ""}
                            </p>

                            <div>
                                ${cartControls}
                            </div>
                        </div>

                        <div class="col-12 col-lg-4">
                            <div class="bg-light rounded p-4 h-100">
                                <p class="text-muted mb-2">Price</p>
                                <h2 class="fw-bold mb-0">${product.price} $</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    loadProduct();
</script>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
