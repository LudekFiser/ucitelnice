<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg: #f6f7fb;
            --surface: #ffffff;
            --surface-soft: #f1f3f7;
            --text: #16181d;
            --muted: #6c7280;
            --border: #e1e5ec;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        }

        html[data-theme="dark"] {
            --bg: #111315;
            --surface: #171a1d;
            --surface-soft: #202428;
            --text: #f1f3f5;
            --muted: #a4a8ae;
            --border: #2d3339;
            --accent: #8ab4ff;
            --accent-soft: rgba(138, 180, 255, 0.12);
            --shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        .app-navbar {
            background: rgba(23, 26, 29, 0.88);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
        }

        .navbar-brand,
        .nav-link {
            color: var(--text) !important;
        }

        .nav-link {
            color: var(--muted) !important;
        }

        .nav-link.active,
        .nav-link:hover {
            color: var(--text) !important;
        }

        .navbar-toggler {
            border-color: var(--border);
        }

        .navbar-toggler-icon {
            filter: invert(1) grayscale(100%);
        }

        .page-shell {
            padding: 64px 0;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .product-panel {
            background:
                    radial-gradient(circle at top right, var(--accent-soft), transparent 34%),
                    var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .preview-box {
            min-height: 420px;
            height: 100%;
            background:
                    linear-gradient(135deg, var(--surface-soft), transparent),
                    radial-gradient(circle at 70% 20%, var(--accent-soft), transparent 42%);
            border-right: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .product-title {
            font-size: clamp(2rem, 4vw, 3.6rem);
            line-height: 1.05;
            letter-spacing: -0.04em;
            font-weight: 800;
        }

        .product-description {
            color: var(--muted);
            font-size: 1.05rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 7px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 700;
            font-size: 0.86rem;
        }

        .purchase-card {
            background: var(--surface-soft);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 24px;
        }

        .price-label {
            color: var(--muted);
            margin-bottom: 4px;
        }

        .price {
            font-size: 2.2rem;
            font-weight: 850;
            letter-spacing: -0.03em;
        }

        .btn-primary-custom {
            background: var(--text);
            color: var(--bg);
            border: 1px solid var(--text);
        }

        .btn-primary-custom:hover {
            background: transparent;
            color: var(--text);
        }

        .btn-outline-custom {
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-outline-custom:hover {
            background: var(--surface-soft);
            color: var(--text);
            border-color: var(--border);
        }

        .qty-pill {
            min-width: 42px;
            text-align: center;
            font-weight: 700;
        }

        .info-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: var(--shadow);
            padding: 24px;
        }

        .info-card p {
            color: var(--muted);
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg app-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/products/all">Učitelnice</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link" href="/products/all">All products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/cart">Cart</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="nav-link" href="/admin/dashboard">Dashboard</a>
                </li>

                <li class="nav-item" th:if="${!isLoggedIn}">
                    <a class="btn btn-outline-custom btn-sm" href="/oauth2/authorization/keycloak">Admin login</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="btn btn-primary-custom btn-sm" href="/products/new">Create product</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <span class="nav-link text-muted">
                        Logged in as: <strong th:text="${username}"></strong>
                    </span>
                </li>

                <li class="nav-item" th:if="${isLoggedIn}">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-outline-custom btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="page-shell">
    <div class="container">
        <div class="mb-4">
            <a href="/products/all" class="back-link">← Back to all products</a>
        </div>

        <div id="productContainer">
            <div class="info-card">
                <p class="mb-0">Loading product...</p>
            </div>
        </div>
    </div>
</section>

<script th:inline="javascript">
    const productId = /*[[${productId}]]*/ 0;

    async function getCartQuantities() {
        const response = await fetch("/api/cart");
        const cartItems = await response.json();

        const quantities = {};

        cartItems.forEach(item => {
            quantities[item.productId] = item.quantity;
        });

        return quantities;
    }

    async function addCartItem(productId) {
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        const response = await fetch(`/api/cart/add/${productId}`, {
            method: "POST",
            headers: {
                [csrfHeader]: csrfToken
            }
        });

        if (response.ok) {
            loadProduct();
        } else {
            alert("Failed to add product to cart");
        }
    }

    async function decreaseCartItem(productId) {
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        const response = await fetch(`/api/cart/decrease/${productId}`, {
            method: "POST",
            headers: {
                [csrfHeader]: csrfToken
            }
        });

        if (response.ok) {
            loadProduct();
        } else {
            alert("Failed to decrease product quantity");
        }
    }

    async function loadProduct() {
        const [productResponse, quantities] = await Promise.all([
            fetch(`/api/products/${productId}`),
            getCartQuantities()
        ]);

        const container = document.getElementById("productContainer");

        if (!productResponse.ok) {
            container.innerHTML = `
                <div class="alert alert-danger">
                    Product not found.
                </div>
            `;
            return;
        }

        const product = await productResponse.json();
        const quantity = quantities[product.id] ?? 0;

        const cartControls = quantity === 0
            ? `<button type="button" class="btn btn-primary-custom w-100" onclick="addCartItem(${product.id})">Add to cart</button>`
            : `
                <div class="d-flex align-items-center gap-2">
                    <button type="button" class="btn btn-outline-custom" onclick="decreaseCartItem(${product.id})">-</button>
                    <span class="qty-pill">${quantity}</span>
                    <button type="button" class="btn btn-outline-custom" onclick="addCartItem(${product.id})">+</button>
                    <a href="/cart" class="btn btn-primary-custom ms-auto">Go to cart</a>
                </div>
            `;

        container.innerHTML = `
            <div class="product-panel">
                <div class="row g-0">
                    <div class="col-12 col-lg-6">
                        <div class="preview-box">
                            Product preview
                        </div>
                    </div>

                    <div class="col-12 col-lg-6">
                        <div class="p-4 p-lg-5">
                            <div class="mb-3">
                                <span class="status-badge">
                                    ${product.active ? "Active product" : "Inactive product"}
                                </span>
                            </div>

                            <h1 class="product-title mb-3">${product.title}</h1>

                            <p class="product-description mb-4">
                                ${product.description ?? "No description available."}
                            </p>

                            <p class="text-muted small mb-4">
                                Created: ${product.createdAt ?? ""}
                            </p>

                            <div class="purchase-card">
                                <p class="price-label">Price</p>
                                <p class="price mb-4">${product.price} Kč</p>

                                ${cartControls}
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4 mt-4">
                <div class="col-12 col-md-4">
                    <div class="info-card h-100">
                        <h2 class="h5">Digital material</h2>
                        <p class="mb-0">After successful payment, access will be available through your order confirmation page.</p>
                    </div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="info-card h-100">
                        <h2 class="h5">Instant checkout</h2>
                        <p class="mb-0">Payment is handled through Stripe Checkout in a secure payment flow.</p>
                    </div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="info-card h-100">
                        <h2 class="h5">Created for teachers</h2>
                        <p class="mb-0">Materials are designed to help with lesson preparation and classroom activities.</p>
                    </div>
                </div>
            </div>
        `;
    }

    loadProduct();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
