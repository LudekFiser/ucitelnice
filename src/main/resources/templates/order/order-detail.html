<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Detail</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/products/all">Home</a>

        <div class="collapse navbar-collapse show">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link" href="/products/all">All products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/cart">Cart</a>
                </li>

                <li class="nav-item" th:if="${isLoggedIn}">
                    <a class="nav-link active" href="/orders/all-orders">Orders</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="btn btn-dark btn-sm" href="/products/new">Create product</a>
                </li>

                <li class="nav-item" th:if="${isLoggedIn}">
                    <span class="nav-link text-muted">
                        Logged in as: <strong th:text="${username}"></strong>
                    </span>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="py-5">
    <div class="container">
        <div class="mb-4">
            <a href="/orders/all-orders" class="text-decoration-none">← Back to orders</a>
        </div>

        <div id="orderDetailContainer"></div>
        <div id="orderItemsContainer" class="mt-4"></div>
    </div>
</section>

<script th:inline="javascript">
    const orderId = /*[[${orderId}]]*/ 0;

    async function loadOrderDetail() {
        const detailContainer = document.getElementById("orderDetailContainer");
        const itemsContainer = document.getElementById("orderItemsContainer");

        try {
            const [orderResponse, itemsResponse] = await Promise.all([
                fetch(`/api/orders/${orderId}`),
                fetch(`/api/order_items/${orderId}/order-items`)
            ]);

            if (!orderResponse.ok || !itemsResponse.ok) {
                detailContainer.innerHTML = `
                    <div class="alert alert-danger">
                        Failed to load order detail.
                    </div>
                `;
                return;
            }

            const order = await orderResponse.json();
            const items = await itemsResponse.json();

            detailContainer.innerHTML = `
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
                            <div>
                                <h1 class="h3 mb-2">Order #${order.id}</h1>
                                <p class="text-muted mb-0">Created: ${order.createdAt ?? ""}</p>
                            </div>

                            <div class="text-end">
                                <span class="badge ${order.paymentStatus === "PAID" ? "text-bg-success" : "text-bg-warning"} mb-2">
                                    ${order.paymentStatus}
                                </span>
                                <br>
                                <span class="badge text-bg-secondary">
                                    ${order.orderStatus}
                                </span>
                            </div>
                        </div>

                        <hr>

                        <div class="row g-3">
                            <div class="col-12 col-md-4">
                                <p class="text-muted mb-1">Customer email</p>
                                <p class="fw-semibold mb-0">${order.customerEmail ?? "-"}</p>
                            </div>

                            <div class="col-12 col-md-4">
                                <p class="text-muted mb-1">Total amount</p>
                                <p class="fw-semibold mb-0">${order.totalAmount} Kč</p>
                            </div>

                            <div class="col-12 col-md-4">
                                <p class="text-muted mb-1">Order ID</p>
                                <p class="fw-semibold mb-0">#${order.id}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            if (items.length === 0) {
                itemsContainer.innerHTML = `
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4 text-center">
                            <h2 class="h5 mb-2">No items found</h2>
                            <p class="text-muted mb-0">This order does not contain any items.</p>
                        </div>
                    </div>
                `;
                return;
            }

            let itemsHtml = `
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="h5 mb-3">Purchased products</h2>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Product ID</th>
                                        <th>Product title</th>
                                        <th>Unit price</th>
                                        <th>Quantity</th>
                                        <th>Total</th>
                                    </tr>
                                </thead>
                                <tbody>
            `;

            items.forEach(item => {
                itemsHtml += `
                    <tr>
                        <td>#${item.productId}</td>
                        <td>${item.productTitle ?? "-"}</td>
                        <td>${item.unitPrice} Kč</td>
                        <td>${item.quantity}</td>
                        <td>${item.total} Kč</td>
                    </tr>
                `;
            });

            itemsHtml += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;

            itemsContainer.innerHTML = itemsHtml;

        } catch (error) {
            detailContainer.innerHTML = `
                <div class="alert alert-danger">
                    Unexpected error while loading order detail.
                </div>
            `;
        }
    }

    loadOrderDetail();
</script>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
