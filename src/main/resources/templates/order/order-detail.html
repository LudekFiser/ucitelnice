<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Order Detail</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg: #f6f7fb;
            --surface: #ffffff;
            --surface-soft: #f1f3f7;
            --text: #16181d;
            --muted: #6c7280;
            --border: #e1e5ec;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        }

        html[data-theme="dark"] {
            --bg: #111315;
            --surface: #171a1d;
            --surface-soft: #202428;
            --text: #f1f3f5;
            --muted: #a4a8ae;
            --border: #2d3339;
            --accent: #8ab4ff;
            --accent-soft: rgba(138, 180, 255, 0.12);
            --shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        .app-navbar {
            background: rgba(23, 26, 29, 0.88);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
        }

        .navbar-brand,
        .nav-link {
            color: var(--text) !important;
        }

        .nav-link {
            color: var(--muted) !important;
        }

        .nav-link.active,
        .nav-link:hover {
            color: var(--text) !important;
        }

        .navbar-toggler {
            border-color: var(--border);
        }

        .navbar-toggler-icon {
            filter: invert(1) grayscale(100%);
        }

        .page-shell {
            padding: 64px 0;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .detail-panel,
        .items-panel,
        .empty-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .detail-panel {
            padding: 32px;
            background:
                    radial-gradient(circle at top right, var(--accent-soft), transparent 34%),
                    var(--surface);
        }

        .page-title {
            font-size: clamp(2rem, 4vw, 3.4rem);
            letter-spacing: -0.04em;
            font-weight: 850;
        }

        .muted {
            color: var(--muted);
        }

        .divider {
            border-color: var(--border);
            opacity: 1;
        }

        .badge-soft {
            border-radius: 999px;
            padding: 7px 11px;
            font-weight: 800;
            font-size: 0.75rem;
        }

        .badge-paid {
            background: rgba(16, 185, 129, 0.18);
            color: #34d399;
        }

        .badge-warning-custom {
            background: rgba(245, 158, 11, 0.18);
            color: #fbbf24;
        }

        .badge-neutral {
            background: var(--surface-soft);
            color: var(--muted);
        }

        .items-panel {
            overflow: hidden;
        }

        .items-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text);
            --bs-table-border-color: var(--border);
            margin-bottom: 0;
        }

        .table thead {
            background: var(--surface-soft);
        }

        .table th {
            color: var(--text);
            font-weight: 800;
            border-bottom: 1px solid var(--border);
            padding: 18px;
        }

        .table td {
            color: var(--text);
            border-bottom: 1px solid var(--border);
            padding: 18px;
            vertical-align: middle;
        }

        .table-hover tbody tr:hover {
            background: var(--surface-soft);
        }

        .btn-primary-custom {
            background: var(--text);
            color: var(--bg);
            border: 1px solid var(--text);
        }

        .btn-primary-custom:hover {
            background: transparent;
            color: var(--text);
        }

        .btn-outline-custom {
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-outline-custom:hover {
            background: var(--surface-soft);
            color: var(--text);
            border-color: var(--border);
        }

        .empty-card {
            padding: 48px;
            text-align: center;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg app-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/products/all">Učitelnice</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link" href="/products/all">All products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/cart">Cart</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="nav-link active" href="/orders">Orders</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="btn btn-primary-custom btn-sm" href="/products/new">Create product</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <span class="nav-link text-muted">
                        Logged in as: <strong th:text="${username}"></strong>
                    </span>
                </li>

                <li class="nav-item" th:if="${isLoggedIn}">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-outline-custom btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="page-shell">
    <div class="container">
        <div class="mb-4">
            <a href="/orders" class="back-link">← Back to orders</a>
        </div>

        <div id="orderDetailContainer"></div>
        <div id="orderItemsContainer" class="mt-4"></div>
    </div>
</section>

<script th:inline="javascript">
    const orderId = /*[[${orderId}]]*/ 0;

    async function loadOrderDetail() {
        const detailContainer = document.getElementById("orderDetailContainer");
        const itemsContainer = document.getElementById("orderItemsContainer");

        try {
            const [orderResponse, itemsResponse] = await Promise.all([
                fetch(`/api/orders/${orderId}`),
                fetch(`/api/order_items/${orderId}/order-items`)
            ]);

            if (!orderResponse.ok || !itemsResponse.ok) {
                detailContainer.innerHTML = `
                    <div class="alert alert-danger">
                        Failed to load order detail.
                    </div>
                `;
                return;
            }

            const order = await orderResponse.json();
            const items = await itemsResponse.json();

            const paymentBadge = order.paymentStatus === "PAID"
                ? "badge-paid"
                : "badge-warning-custom";

            detailContainer.innerHTML = `
                <div class="detail-panel">
                    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
                        <div>
                            <p class="muted mb-2">Order detail</p>
                            <h1 class="page-title mb-2">Order #${order.id}</h1>
                            <p class="muted mb-0">Created: ${order.createdAt ?? ""}</p>
                        </div>

                        <div class="text-end">
                            <span class="badge-soft ${paymentBadge} mb-2 d-inline-flex">
                                ${order.paymentStatus}
                            </span>
                            <br>
                            <span class="badge-soft badge-neutral d-inline-flex">
                                ${order.orderStatus}
                            </span>
                        </div>
                    </div>

                    <hr class="divider my-4">

                    <div class="row g-4">
                        <div class="col-12 col-md-4">
                            <p class="muted mb-1">Customer email</p>
                            <p class="fw-semibold mb-0">${order.customerEmail ?? "-"}</p>
                        </div>

                        <div class="col-12 col-md-4">
                            <p class="muted mb-1">Total amount</p>
                            <p class="fw-semibold mb-0">${order.totalAmount} Kč</p>
                        </div>

                        <div class="col-12 col-md-4">
                            <p class="muted mb-1">Order ID</p>
                            <p class="fw-semibold mb-0">#${order.id}</p>
                        </div>
                    </div>
                </div>
            `;

            if (items.length === 0) {
                itemsContainer.innerHTML = `
                    <div class="empty-card">
                        <h2 class="h5 mb-2">No items found</h2>
                        <p class="muted mb-0">This order does not contain any items.</p>
                    </div>
                `;
                return;
            }

            let itemsHtml = `
                <div class="items-panel">
                    <div class="items-header">
                        <h2 class="h4 mb-1">Purchased products</h2>
                        <p class="muted mb-0">Products included in this order.</p>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>Product ID</th>
                                    <th>Product title</th>
                                    <th>Unit price</th>
                                    <th>Quantity</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            items.forEach(item => {
                itemsHtml += `
                    <tr>
                        <td class="fw-bold">#${item.productId}</td>
                        <td>${item.productTitle ?? "-"}</td>
                        <td>${item.unitPrice} Kč</td>
                        <td>${item.quantity}</td>
                        <td class="fw-semibold">${item.total} Kč</td>
                    </tr>
                `;
            });

            itemsHtml += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            itemsContainer.innerHTML = itemsHtml;

        } catch (error) {
            detailContainer.innerHTML = `
                <div class="alert alert-danger">
                    Unexpected error while loading order detail.
                </div>
            `;
        }
    }

    loadOrderDetail();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
