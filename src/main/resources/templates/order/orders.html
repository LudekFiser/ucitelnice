<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Orders</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/products/all">Home</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link" href="/products/all">All products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/cart">Cart</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="btn btn-dark btn-sm" href="/products/new">Create product</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="nav-link" href="/orders/all-orders">Orders</a>
                </li>

                <li class="nav-item" th:if="${isLoggedIn}">
                    <span class="nav-link text-muted">
                        Logged in as: <strong th:text="${username}"></strong>
                    </span>
                </li>

                <li class="nav-item" th:if="${isLoggedIn}">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="py-5">
    <div class="container">
        <div class="mb-4">
            <h1 class="h2 mb-1">Orders</h1>
            <p class="text-muted mb-0">Overview of customer orders.</p>
        </div>

        <div id="ordersContainer"></div>
    </div>
</section>

<script>
    async function loadOrders() {
        const container = document.getElementById("ordersContainer");

        try {
            const response = await fetch("/api/orders/all-orders");

            if (!response.ok) {
                container.innerHTML = `
                    <div class="alert alert-danger">
                        Failed to load orders.
                    </div>
                `;
                return;
            }

            const orders = await response.json();

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4 text-center">
                            <h3 class="h5 mb-2">No orders found</h3>
                            <p class="text-muted mb-0">Orders will appear here after successful checkout.</p>
                        </div>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="card border-0 shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Email</th>
                                    <th>Total</th>
                                    <th>Order status</th>
                                    <th>Payment status</th>
                                    <th>Created</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            orders.forEach(order => {
                html += `
                    <tr>
                        <td>#${order.id}</td>
                        <td>${order.customerEmail ?? "-"}</td>
                        <td>${order.totalAmount} Kč</td>
                        <td>
                            <span class="badge text-bg-secondary">
                                ${order.orderStatus}
                            </span>
                        </td>
                        <td>
                            <span class="badge ${order.paymentStatus === "PAID" ? "text-bg-success" : "text-bg-warning"}">
                                ${order.paymentStatus}
                            </span>
                        </td>
                        <td>${order.createdAt ?? ""}</td>
                        <td class="text-end">
                            <a href="/orders/${order.id}" class="btn btn-outline-dark btn-sm">
                                Detail
                            </a>
                        </td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            container.innerHTML = html;

        } catch (error) {
            container.innerHTML = `
                <div class="alert alert-danger">
                    Unexpected error while loading orders.
                </div>
            `;
        }
    }

    loadOrders();
</script>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
