<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Orders</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg: #f6f7fb;
            --surface: #ffffff;
            --surface-soft: #f1f3f7;
            --text: #16181d;
            --muted: #6c7280;
            --border: #e1e5ec;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        }

        html[data-theme="dark"] {
            --bg: #111315;
            --surface: #171a1d;
            --surface-soft: #202428;
            --text: #f1f3f5;
            --muted: #a4a8ae;
            --border: #2d3339;
            --accent: #8ab4ff;
            --accent-soft: rgba(138, 180, 255, 0.12);
            --shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        .app-navbar {
            background: rgba(23, 26, 29, 0.88);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
        }

        .navbar-brand,
        .nav-link {
            color: var(--text) !important;
        }

        .nav-link {
            color: var(--muted) !important;
        }

        .nav-link.active,
        .nav-link:hover {
            color: var(--text) !important;
        }

        .navbar-toggler {
            border-color: var(--border);
        }

        .navbar-toggler-icon {
            filter: invert(1) grayscale(100%);
        }

        .page-shell {
            padding: 64px 0;
        }

        .page-title {
            font-size: clamp(2.2rem, 4vw, 3.5rem);
            letter-spacing: -0.04em;
            font-weight: 850;
        }

        .muted {
            color: var(--muted);
        }

        .orders-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text);
            --bs-table-border-color: var(--border);
            margin-bottom: 0;
        }

        .table thead {
            background: var(--surface-soft);
        }

        .table th {
            color: var(--text);
            font-weight: 800;
            border-bottom: 1px solid var(--border);
            padding: 18px;
        }

        .table td {
            color: var(--text);
            border-bottom: 1px solid var(--border);
            padding: 18px;
            vertical-align: middle;
        }

        .table-hover tbody tr:hover {
            background: var(--surface-soft);
        }

        .badge-soft {
            border-radius: 999px;
            padding: 7px 11px;
            font-weight: 800;
            font-size: 0.75rem;
        }

        .badge-paid {
            background: rgba(16, 185, 129, 0.18);
            color: #34d399;
        }

        .badge-warning-custom {
            background: rgba(245, 158, 11, 0.18);
            color: #fbbf24;
        }

        .badge-neutral {
            background: var(--surface-soft);
            color: var(--muted);
        }

        .btn-primary-custom {
            background: var(--text);
            color: var(--bg);
            border: 1px solid var(--text);
        }

        .btn-primary-custom:hover {
            background: transparent;
            color: var(--text);
        }

        .btn-outline-custom {
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-outline-custom:hover {
            background: var(--surface-soft);
            color: var(--text);
            border-color: var(--border);
        }

        .empty-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 48px;
            text-align: center;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg app-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/products/all">Učitelnice</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link" href="/products/all">All products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/cart">Cart</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="btn btn-primary-custom btn-sm" href="/products/new">Create product</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="nav-link active" href="/orders">Orders</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <span class="nav-link text-muted">
                        Logged in as: <strong th:text="${username}"></strong>
                    </span>
                </li>

                <li class="nav-item" th:if="${isLoggedIn}">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-outline-custom btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="page-shell">
    <div class="container">
        <div class="mb-5">
            <h1 class="page-title mb-2">Orders</h1>
            <p class="muted mb-0">Overview of customer orders and payment statuses.</p>
        </div>

        <div id="ordersContainer"></div>
    </div>
</section>

<script>
    async function loadOrders() {
        const container = document.getElementById("ordersContainer");

        try {
            const response = await fetch("/api/orders/all-orders");

            if (!response.ok) {
                container.innerHTML = `
                    <div class="alert alert-danger">
                        Failed to load orders.
                    </div>
                `;
                return;
            }

            const orders = await response.json();

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-card">
                        <h3 class="h4 mb-2">No orders found</h3>
                        <p class="muted mb-0">Orders will appear here after successful checkout.</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="orders-panel">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Email</th>
                                    <th>Total</th>
                                    <th>Order status</th>
                                    <th>Payment status</th>
                                    <th>Created</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            orders.forEach(order => {
                const paymentBadge = order.paymentStatus === "PAID"
                    ? "badge-paid"
                    : "badge-warning-custom";

                html += `
                    <tr>
                        <td class="fw-bold">#${order.id}</td>
                        <td>${order.customerEmail ?? "-"}</td>
                        <td class="fw-semibold">${order.totalAmount} Kč</td>
                        <td>
                            <span class="badge-soft badge-neutral">
                                ${order.orderStatus}
                            </span>
                        </td>
                        <td>
                            <span class="badge-soft ${paymentBadge}">
                                ${order.paymentStatus}
                            </span>
                        </td>
                        <td class="muted">${order.createdAt ?? ""}</td>
                        <td class="text-end">
                            <a href="/orders/${order.id}" class="btn btn-outline-custom btn-sm">
                                Detail
                            </a>
                        </td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            container.innerHTML = html;

        } catch (error) {
            container.innerHTML = `
                <div class="alert alert-danger">
                    Unexpected error while loading orders.
                </div>
            `;
        }
    }

    loadOrders();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
