<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/products/all">Home</a>
    </div>
</nav>

<section class="py-5">
    <div class="container">
        <div id="confirmationContainer"></div>
        <div id="itemsContainer" class="mt-4"></div>
    </div>
</section>

<script th:inline="javascript">
    const confirmationCode = /*[[${confirmationCode}]]*/ "";

    async function loadConfirmation() {
        const confirmationContainer = document.getElementById("confirmationContainer");
        const itemsContainer = document.getElementById("itemsContainer");

        try {
            const orderResponse = await fetch(`/api/orders/confirmation/${confirmationCode}`);

            if (!orderResponse.ok) {
                confirmationContainer.innerHTML = `
                    <div class="alert alert-danger">
                        Order confirmation link is invalid or expired.
                    </div>
                `;
                return;
            }

            const order = await orderResponse.json();

            const itemsResponse = await fetch(`/api/order_items/${order.id}/order-items`);

            if (!itemsResponse.ok) {
                confirmationContainer.innerHTML = `
                    <div class="alert alert-danger">
                        Failed to load purchased products.
                    </div>
                `;
                return;
            }

            const items = await itemsResponse.json();

            confirmationContainer.innerHTML = `
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-lg-5">
                        <div class="mb-4">
                            <h1 class="h3 mb-2">Thank you for your purchase ✅</h1>
                            <p class="text-muted mb-0">
                                Your order has been successfully paid and is ready.
                            </p>
                        </div>

                        <div class="row g-3">
                            <div class="col-12 col-md-4">
                                <p class="text-muted mb-1">Order number</p>
                                <p class="fw-semibold mb-0">#${order.id}</p>
                            </div>

                            <div class="col-12 col-md-4">
                                <p class="text-muted mb-1">Email</p>
                                <p class="fw-semibold mb-0">${order.customerEmail ?? "-"}</p>
                            </div>

                            <div class="col-12 col-md-4">
                                <p class="text-muted mb-1">Total</p>
                                <p class="fw-semibold mb-0">${order.totalAmount} Kč</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            if (items.length === 0) {
                itemsContainer.innerHTML = `
                    <div class="alert alert-light border">
                        No products found for this order.
                    </div>
                `;
                return;
            }

            let html = `
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="h5 mb-3">Your purchased products</h2>

                        <div class="row g-3">
            `;

            items.forEach(item => {
                html += `
                    <div class="col-12">
                        <div class="border rounded p-3 bg-white">
                            <div class="d-flex flex-column flex-md-row justify-content-between gap-3">
                                <div>
                                    <h3 class="h6 mb-1">${item.productTitle ?? "Product #" + item.productId}</h3>
                                    <p class="text-muted mb-1">Quantity: ${item.quantity}</p>
                                    <p class="mb-0"><strong>Total:</strong> ${item.total} Kč</p>
                                </div>

                                <div class="d-flex align-items-center">
                                    <a href="${item.googleDriveUrl}"
                                       class="btn btn-dark"
                                       target="_blank">
                                        Download
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                        </div>
                    </div>
                </div>
            `;

            itemsContainer.innerHTML = html;

        } catch (error) {
            confirmationContainer.innerHTML = `
                <div class="alert alert-danger">
                    Unexpected error while loading confirmation page.
                </div>
            `;
        }
    }

    loadConfirmation();
</script>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
