<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/products/all">Home</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link" href="/products/all">All products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="/cart">Cart</a>
                </li>

                <li class="nav-item" th:if="${!isLoggedIn}">
                    <a class="btn btn-outline-dark btn-sm" href="/oauth2/authorization/keycloak">Admin login</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="btn btn-dark btn-sm" href="/products/new">Create product</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="nav-link" href="/orders/all-orders">Orders</a>
                </li>

                <li class="nav-item" th:if="${isLoggedIn}">
                    <span class="nav-link text-muted">
                        Logged in as: <strong th:text="${username}"></strong>
                    </span>
                </li>

                <li class="nav-item" th:if="${isLoggedIn}">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="py-5">
    <div class="container">
        <div class="mb-4">
            <h1 class="h2 mb-1">Your cart</h1>
            <p class="text-muted mb-0">Review selected products before checkout.</p>
        </div>

        <div class="row g-4">
            <div class="col-12 col-lg-8">
                <div id="cartContainer"></div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="h5 mb-3">Order summary</h2>

                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Items</span>
                            <span id="summaryItems">0</span>
                        </div>

                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted">Total</span>
                            <strong id="cartTotal">0.00</strong>
                        </div>

                        <hr>

                        <button type="button"
                                class="btn btn-dark w-100"
                                id="checkoutBtn"
                                onclick="proceedToCheckout()"
                                disabled>
                            Proceed to checkout
                        </button>

                        <p class="text-muted small mb-0 mt-3">
                            You will be redirected to secure Stripe Checkout.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    async function addCartItem(productId) {
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        const response = await fetch(`/api/cart/add/${productId}`, {
            method: "POST",
            headers: {
                [csrfHeader]: csrfToken
            }
        });

        if (response.ok) {
            loadCart();
        } else {
            alert("Failed to add product");
        }
    }

    async function decreaseCartItem(productId) {
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        const response = await fetch(`/api/cart/decrease/${productId}`, {
            method: "POST",
            headers: {
                [csrfHeader]: csrfToken
            }
        });

        if (response.ok) {
            loadCart();
        } else {
            alert("Failed to decrease product");
        }
    }

    async function proceedToCheckout() {
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        const checkoutBtn = document.getElementById("checkoutBtn");
        checkoutBtn.disabled = true;
        checkoutBtn.textContent = "Redirecting...";

        try {
            const response = await fetch("/api/payment/checkout", {
                method: "POST",
                headers: {
                    [csrfHeader]: csrfToken
                }
            });

            if (!response.ok) {
                alert("Failed to create checkout session.");
                checkoutBtn.disabled = false;
                checkoutBtn.textContent = "Proceed to checkout";
                return;
            }

            const checkoutUrl = await response.text();
            window.location.href = checkoutUrl;

        } catch (error) {
            alert("Unexpected error during checkout.");
            checkoutBtn.disabled = false;
            checkoutBtn.textContent = "Proceed to checkout";
        }
    }

    async function loadCart() {
        const response = await fetch("/api/cart");
        const items = await response.json();

        const container = document.getElementById("cartContainer");
        const totalElement = document.getElementById("cartTotal");
        const summaryItemsElement = document.getElementById("summaryItems");
        const checkoutBtn = document.getElementById("checkoutBtn");

        container.innerHTML = "";

        if (items.length === 0) {
            container.innerHTML = `
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 text-center">
                        <h3 class="h5 mb-2">Your cart is empty</h3>
                        <p class="text-muted mb-3">Browse products and add your first item.</p>
                        <a href="/products/all" class="btn btn-outline-dark">Back to products</a>
                    </div>
                </div>
            `;
            totalElement.textContent = "0.00";
            summaryItemsElement.textContent = "0";
            checkoutBtn.disabled = true;
            return;
        }

        checkoutBtn.disabled = false;

        let total = 0;
        let totalItems = 0;

        items.forEach(item => {
            const subtotal = Number(item.price) * Number(item.quantity);
            total += subtotal;
            totalItems += Number(item.quantity);

            const card = document.createElement("div");
            card.className = "card border-0 shadow-sm mb-3";

            card.innerHTML = `
                <div class="card-body p-4">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <div>
                            <h3 class="h5 mb-1">${item.title}</h3>
                            <p class="text-muted mb-1">Unit price: ${item.price}</p>
                            <p class="mb-0"><strong>Subtotal:</strong> ${subtotal.toFixed(2)}</p>
                        </div>

                        <div class="d-flex align-items-center gap-2">
                            <button type="button" class="btn btn-outline-dark btn-sm" onclick="decreaseCartItem(${item.productId})">-</button>
                            <span class="fw-semibold px-2">${item.quantity}</span>
                            <button type="button" class="btn btn-outline-dark btn-sm" onclick="addCartItem(${item.productId})">+</button>
                        </div>
                    </div>
                </div>
            `;

            container.appendChild(card);
        });

        totalElement.textContent = total.toFixed(2);
        summaryItemsElement.textContent = totalItems;
    }

    loadCart();
</script>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
