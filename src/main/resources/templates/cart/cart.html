<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg: #f6f7fb;
            --surface: #ffffff;
            --surface-soft: #f1f3f7;
            --text: #16181d;
            --muted: #6c7280;
            --border: #e1e5ec;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        }

        html[data-theme="dark"] {
            --bg: #111315;
            --surface: #171a1d;
            --surface-soft: #202428;
            --text: #f1f3f5;
            --muted: #a4a8ae;
            --border: #2d3339;
            --accent: #8ab4ff;
            --accent-soft: rgba(138, 180, 255, 0.12);
            --shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        .app-navbar {
            background: rgba(23, 26, 29, 0.88);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
        }

        .navbar-brand,
        .nav-link {
            color: var(--text) !important;
        }

        .nav-link {
            color: var(--muted) !important;
        }

        .nav-link.active,
        .nav-link:hover {
            color: var(--text) !important;
        }

        .navbar-toggler {
            border-color: var(--border);
        }

        .navbar-toggler-icon {
            filter: invert(1) grayscale(100%);
        }

        .page-shell {
            padding: 64px 0;
        }

        .page-title {
            font-size: clamp(2.2rem, 4vw, 3.5rem);
            letter-spacing: -0.04em;
            font-weight: 800;
        }

        .page-subtitle {
            color: var(--muted);
            font-size: 1.05rem;
        }

        .cart-card,
        .summary-card,
        .empty-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .cart-card {
            padding: 24px;
            margin-bottom: 16px;
        }

        .summary-card {
            padding: 28px;
            position: sticky;
            top: 96px;
        }

        .item-title {
            font-size: 1.15rem;
            font-weight: 750;
        }

        .muted {
            color: var(--muted);
        }

        .qty-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-weight: 800;
        }

        .qty-btn:hover {
            background: var(--surface-soft);
        }

        .qty-value {
            min-width: 36px;
            text-align: center;
            font-weight: 800;
        }

        .btn-primary-custom {
            background: var(--text);
            color: var(--bg);
            border: 1px solid var(--text);
        }

        .btn-primary-custom:hover {
            background: transparent;
            color: var(--text);
        }

        .btn-outline-custom {
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-outline-custom:hover {
            background: var(--surface-soft);
            color: var(--text);
            border-color: var(--border);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }

        .summary-total {
            font-size: 1.45rem;
            font-weight: 850;
            letter-spacing: -0.03em;
        }

        .divider {
            border-color: var(--border);
            opacity: 1;
        }

        .empty-card {
            padding: 48px;
            text-align: center;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg app-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/products/all">Učitelnice</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link" href="/products/all">All products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="/cart">Cart</a>
                </li>

                <li class="nav-item" th:if="${!isLoggedIn}">
                    <a class="btn btn-outline-custom btn-sm" href="/oauth2/authorization/keycloak">Admin login</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="btn btn-primary-custom btn-sm" href="/products/new">Create product</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <a class="nav-link" href="/admin/dashboard">Dashboard</a>
                </li>

                <li class="nav-item" th:if="${isAdmin}">
                    <span class="nav-link text-muted">
                        Logged in as: <strong th:text="${username}"></strong>
                    </span>
                </li>

                <li class="nav-item" th:if="${isLoggedIn}">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-outline-custom btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="page-shell">
    <div class="container">
        <div class="mb-5">
            <h1 class="page-title mb-2">Your cart</h1>
            <p class="page-subtitle mb-0">Review your selected teaching materials before checkout.</p>
        </div>

        <div class="row g-4">
            <div class="col-12 col-lg-8">
                <div id="cartContainer"></div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="summary-card">
                    <h2 class="h4 mb-4">Order summary</h2>

                    <div class="summary-row">
                        <span class="muted">Items</span>
                        <span id="summaryItems">0</span>
                    </div>

                    <div class="summary-row">
                        <span class="muted">Total</span>
                        <span class="summary-total" id="cartTotal">0.00 Kč</span>
                    </div>

                    <hr class="divider my-4">

                    <button type="button"
                            class="btn btn-primary-custom w-100 btn-lg"
                            id="checkoutBtn"
                            onclick="proceedToCheckout()"
                            disabled>
                        Proceed to checkout
                    </button>

                    <p class="muted small mb-0 mt-3">
                        You will be redirected to secure Stripe Checkout.
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    async function addCartItem(productId) {
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        const response = await fetch(`/api/cart/add/${productId}`, {
            method: "POST",
            headers: {
                [csrfHeader]: csrfToken
            }
        });

        if (response.ok) {
            loadCart();
        } else {
            alert("Failed to add product");
        }
    }

    async function decreaseCartItem(productId) {
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        const response = await fetch(`/api/cart/decrease/${productId}`, {
            method: "POST",
            headers: {
                [csrfHeader]: csrfToken
            }
        });

        if (response.ok) {
            loadCart();
        } else {
            alert("Failed to decrease product");
        }
    }

    async function proceedToCheckout() {
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        const checkoutBtn = document.getElementById("checkoutBtn");
        checkoutBtn.disabled = true;
        checkoutBtn.textContent = "Redirecting...";

        try {
            const response = await fetch("/api/payment/checkout", {
                method: "POST",
                headers: {
                    [csrfHeader]: csrfToken
                }
            });

            if (!response.ok) {
                alert("Failed to create checkout session.");
                checkoutBtn.disabled = false;
                checkoutBtn.textContent = "Proceed to checkout";
                return;
            }

            const checkoutUrl = await response.text();
            window.location.href = checkoutUrl;

        } catch (error) {
            alert("Unexpected error during checkout.");
            checkoutBtn.disabled = false;
            checkoutBtn.textContent = "Proceed to checkout";
        }
    }

    async function loadCart() {
        const response = await fetch("/api/cart");
        const items = await response.json();

        const container = document.getElementById("cartContainer");
        const totalElement = document.getElementById("cartTotal");
        const summaryItemsElement = document.getElementById("summaryItems");
        const checkoutBtn = document.getElementById("checkoutBtn");

        container.innerHTML = "";

        if (items.length === 0) {
            container.innerHTML = `
                <div class="empty-card">
                    <h3 class="h4 mb-2">Your cart is empty</h3>
                    <p class="muted mb-4">Browse products and add your first material.</p>
                    <a href="/products/all" class="btn btn-outline-custom">Back to products</a>
                </div>
            `;
            totalElement.textContent = "0.00 Kč";
            summaryItemsElement.textContent = "0";
            checkoutBtn.disabled = true;
            return;
        }

        checkoutBtn.disabled = false;

        let total = 0;
        let totalItems = 0;

        items.forEach(item => {
            const subtotal = Number(item.price) * Number(item.quantity);
            total += subtotal;
            totalItems += Number(item.quantity);

            const card = document.createElement("div");
            card.className = "cart-card";

            card.innerHTML = `
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-4">
                    <div>
                        <h3 class="item-title mb-2">${item.title}</h3>
                        <p class="muted mb-1">Unit price: ${item.price} Kč</p>
                        <p class="mb-0"><strong>Subtotal:</strong> ${subtotal.toFixed(2)} Kč</p>
                    </div>

                    <div class="d-flex align-items-center gap-2">
                        <button type="button" class="qty-btn" onclick="decreaseCartItem(${item.productId})">-</button>
                        <span class="qty-value">${item.quantity}</span>
                        <button type="button" class="qty-btn" onclick="addCartItem(${item.productId})">+</button>
                    </div>
                </div>
            `;

            container.appendChild(card);
        });

        totalElement.textContent = `${total.toFixed(2)} Kč`;
        summaryItemsElement.textContent = totalItems;
    }

    loadCart();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
